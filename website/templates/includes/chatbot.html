{% load static %}

<!-- Chatbot Floating Button -->
<button class="chatbot-fab" id="chatbotFab" onclick="toggleChatbot()" aria-label="Open chat">
    <i class="fas fa-comments"></i>
    <i class="fas fa-times"></i>
</button>

<!-- Chat Window -->
<div class="chatbot-window" id="chatbotWindow">
    <div class="chatbot-header">
        <div class="chatbot-header-info">
            <div class="chatbot-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h6 class="mb-0">AutoZone AI Assistant</h6>
                <small class="text-white-50">Ask me about parts, prices...</small>
            </div>
        </div>
        <button class="chatbot-close" onclick="toggleChatbot()">
            <i class="fas fa-times"></i>
        </button>
    </div>
    
    <div class="chatbot-messages" id="chatbotMessages">
        <div class="message bot-message">
            <div class="message-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="message-content">
                <strong>Hello! I'm your AutoZone AI Assistant</strong><br><br>
                I can help you find:
                <ul>
                    <li>Auto parts by brand, name, or code</li>
                    <li>Prices and availability</li>
                    <li>Information about our services</li>
                    <li>Customer and region details</li>
                </ul>
                What can I help you find today?
            </div>
        </div>
    </div>
    
    <div class="chatbot-suggestions" id="chatbotSuggestions">
        <button class="suggestion-btn" onclick="askQuestion('What brands of parts do you carry?')">Brands</button>
        <button class="suggestion-btn" onclick="askQuestion('Show me Hero parts')">Hero Parts</button>
        <button class="suggestion-btn" onclick="askQuestion('Show me Bajaj parts')">Bajaj Parts</button>
        <button class="suggestion-btn" onclick="askQuestion('How many products do you have?')">Product Count</button>
    </div>
    
    <div class="chatbot-input">
        <input type="text" id="chatInput" placeholder="Ask about parts, prices, brands..." autocomplete="off">
        <button class="chatbot-send" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
var chatbotOpen = false;

function toggleChatbot() {
    chatbotOpen = !chatbotOpen;
    var fab = document.getElementById('chatbotFab');
    var window = document.getElementById('chatbotWindow');
    var input = document.getElementById('chatInput');
    
    if (chatbotOpen) {
        fab.classList.add('active');
        window.classList.add('active');
        input.focus();
    } else {
        fab.classList.remove('active');
        window.classList.remove('active');
    }
}

function askQuestion(question) {
    document.getElementById('chatInput').value = question;
    sendMessage();
}

function sendMessage() {
    var input = document.getElementById('chatInput');
    var message = input.value.trim();
    if (!message) return;
    
    var messages = document.getElementById('chatbotMessages');
    
    // Add user message
    var userMsg = document.createElement('div');
    userMsg.className = 'message user-message';
    userMsg.innerHTML = '<div class="message-avatar"><i class="fas fa-user"></i></div><div class="message-content">' + message + '</div>';
    messages.appendChild(userMsg);
    
    input.value = '';
    messages.scrollTop = messages.scrollHeight;
    
    // Add typing indicator
    var typing = document.createElement('div');
    typing.id = 'typingIndicator';
    typing.className = 'message bot-message';
    typing.innerHTML = '<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
    
    // Send to API
    fetch('/api/chatbot/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrfToken()
        },
        body: JSON.stringify({question: message})
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('typingIndicator').remove();
        var botMsg = document.createElement('div');
        botMsg.className = 'message bot-message';
        botMsg.innerHTML = '<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content">' + formatContent(data.answer) + '</div>';
        messages.appendChild(botMsg);
        messages.scrollTop = messages.scrollHeight;
    })
    .catch(error => {
        document.getElementById('typingIndicator').remove();
        var errorMsg = document.createElement('div');
        errorMsg.className = 'message bot-message';
        errorMsg.innerHTML = '<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content">Sorry, an error occurred. Please try again.</div>';
        messages.appendChild(errorMsg);
        messages.scrollTop = messages.scrollHeight;
    });
}

function formatContent(content) {
    return content
        .replace(/\*\*(.*?)\*\*/g, '<strong></strong>')
        .replace(/\n/g, '<br>');
}

function getCsrfToken() {
    var name = 'csrftoken';
    var cookieValue = null;
    if (document.cookie) {
        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
            var cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + '=') {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Enter key to send
document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('chatInput');
    if (input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
    }
});
</script>

<style>
.chatbot-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255, 152, 0, 0.4);
    z-index: 99999 !important;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.chatbot-fab:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 25px rgba(255, 152, 0, 0.5);
}

.chatbot-fab .fa-times { display: none; }
.chatbot-fab.active .fa-comments { display: none; }
.chatbot-fab.active .fa-times { display: block; }

.chatbot-window {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 380px;
    height: 550px;
    max-width: calc(100vw - 48px);
    max-height: calc(100vh - 120px);
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
    display: none;
    flex-direction: column;
    z-index: 99998 !important;
    overflow: hidden;
}

.chatbot-window.active { display: flex; }

.chatbot-header {
    background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chatbot-header-info { display: flex; align-items: center; gap: 12px; }
.chatbot-avatar { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.chatbot-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 8px; opacity: 0.8; }
.chatbot-close:hover { opacity: 1; }

.chatbot-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.message { display: flex; gap: 10px; max-width: 85%; }
.message.user-message { align-self: flex-end; flex-direction: row-reverse; }
.message-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; color: #FF9800; }
.message.user-message .message-avatar { background: #FF9800; color: white; }
.message-content { background: #f5f5f5; padding: 12px 16px; border-radius: 16px; border-top-left-radius: 4px; font-size: 14px; line-height: 1.5; }
.message.user-message .message-content { background: #FF9800; color: white; border-radius: 16px 4px 16px 4px; }
.message-content strong { color: #FF9800; }
.message.user-message .message-content strong { color: white; }

.typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
.typing-indicator span { width: 8px; height: 8px; background: #FF9800; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

.chatbot-suggestions { padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px solid #eee; }
.suggestion-btn { background: #fff3e0; border: 1px solid #FF9800; color: #F57C00; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
.suggestion-btn:hover { background: #FF9800; color: white; }

.chatbot-input { padding: 16px; display: flex; gap: 10px; border-top: 1px solid #eee; }
.chatbot-input input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px; }
.chatbot-input input:focus { border-color: #FF9800; }
.chatbot-send { width: 48px; height: 48px; border-radius: 50%; background: #FF9800; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.chatbot-send:hover { background: #F57C00; }
.chatbot-send:disabled { background: #ccc; cursor: not-allowed; }

.chatbot-messages::-webkit-scrollbar { width: 6px; }
.chatbot-messages::-webkit-scrollbar-track { background: #f1f1f1; }
.chatbot-messages::-webkit-scrollbar-thumb { background: #FF9800; border-radius: 3px; }

@media (max-width: 480px) {
    .chatbot-window { width: calc(100vw - 32px); right: 16px; bottom: 90px; height: calc(100vh - 120px); }
    .chatbot-fab { right: 16px; bottom: 16px; }
}
</style>
